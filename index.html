<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái Tim Vì Sao</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050510;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .text-container {
            position: absolute;
            text-align: center;
            color: #fff;
            z-index: 2;
            pointer-events: none;
            top: 15%;
            display: none; /* Ẩn đi lúc đầu, trả lời xong mới hiện */
        }
        h1 {
            font-size: 24px;
            color: #ff75a0;
            text-shadow: 0 0 10px #ff75a0, 0 0 20px #ff2a74;
            margin-bottom: 5px;
        }
        p {
            font-size: 16px;
            color: #a0c4ff;
            text-shadow: 0 0 8px #a0c4ff;
        }
    </style>
</head>
<body>

    <div class="text-container" id="loveText">
        <h1>I love you in every universe</h1>
        <p>Em là ngôi sao sáng nhất của anh</p>
    </div>

    <canvas id="heartCanvas"></canvas>

    <script>
        // Hộp thoại hỏi "Bạn nhỏ" lúc vừa vào web
        setTimeout(() => {
            let traLoi = false;
            while (!traLoi) {
                let s = confirm("Bạn nhỏ có yêu anh khum? ❤️\n\n(Bấm OK là Có, Cancel là Không nha)");
                if (s) {
                    alert("Anh biết mà! Anh cũng yêu bạn nhỏ nhiều lắm 🥰");
                    document.getElementById('loveText').style.display = 'block'; // Hiện chữ lãng mạn ra
                    traLoi = true;
                } else {
                    alert("Ủa gõ nhầm nút Cancel đúng khum? Chọn lại đi bớ bạn nhỏ! 😜");
                }
            }
        }, 500);

        // --- Đoạn code vẽ trái tim lấp lánh giữ nguyên ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function heartShape(t, scale = 12) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * scale + width / 2, y: y * scale + height / 2 + 30 };
        }

        class Particle {
            constructor(t) {
                const pos = heartShape(t, Math.random() * 3 + 10);
                this.x = pos.x;
                this.y = pos.y;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.005;
                this.color = `hsl(${Math.random() * 40 + 330}, 100%, 75%)`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        const particles = [];
        let t = 0;

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.1)';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(t));
                t += 0.05;
                if (t > Math.PI * 2) t = 0;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
